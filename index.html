<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股雷達 2.0 | FinMind 智能核心</title>
    <!-- 增加快取清除機制 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #fb7185;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .logo-text {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .update-tag {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            padding: 0.4rem 1.2rem;
            border-radius: 99px;
            font-size: 0.85rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-blue);
            background: rgba(30, 41, 59, 0.8);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .symbol { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 4px; display: block; }
        .name { font-size: 1.6rem; font-weight: 700; }
        .score { 
            font-size: 1.2rem; font-weight: 700; 
            color: var(--accent-blue); 
            background: rgba(56, 189, 248, 0.1);
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .price { font-size: 2.2rem; font-weight: 600; }
        .change { font-weight: 500; }
        .up { color: var(--accent-red); }
        .down { color: var(--accent-green); }

        .ai-analysis {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo-text">DYNAMIC RADAR 2.0</h1>
            <div class="update-tag" id="update-time">數據準備中...</div>
        </header>

        <div class="grid" id="stock-grid">
            <!-- 動態內容 -->
        </div>
    </div>

    <!-- 強制不使用快取載入數據 -->
    <script>
        document.write('<script src="dashboard_data.js?v=' + Date.now() + '"><\/script>');
    </script>
    
    <script>
        function render() {
            const grid = document.getElementById('stock-grid');
            const timeTag = document.getElementById('update-time');
            
            if (!window.STOCK_DATA) {
                grid.innerHTML = "數據加載失敗，請檢查 dashboard_data.js";
                return;
            }

            timeTag.innerText = `市場最後同步時間：${window.LAST_UPDATE}`;
            
            grid.innerHTML = window.STOCK_DATA.map((s, i) => {
                const isUp = !s.change.includes('-');
                const color = isUp ? 'up' : 'down';
                const icon = isUp ? '▲' : '▼';

                return `
                <div class="card" style="animation: fadeInUp 0.6s ease-out ${i * 0.1}s both">
                    <div class="card-head">
                        <div>
                            <span class="symbol">${s.symbol}</span>
                            <span class="name">${s.name}</span>
                        </div>
                        <div class="score">${s.score}</div>
                    </div>
                    <div class="price-row">
                        <span class="price">${s.price}</span>
                        <span class="change ${color}">${icon}${s.change} (${s.pct})</span>
                    </div>
                    <div class="ai-analysis">${s.insight}</div>
                </div>
                `;
            }).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
